<div class="row">
  <div class="col">
    <nb-card>
      <nb-card-header>
        {{title}}
      </nb-card-header>
      <nb-card-body>
          <ng2-smart-table
            [settings]="settings"
            [source]="source"
            (edit)="edit($event)"
            (delete)="delete($event)"
            (create)="create()"
          >
          </ng2-smart-table>
      </nb-card-body>
    </nb-card>
  </div>
</div>
